name: XamePage Release APK

on:
  push:
    branches: [xamepage-native-v3.0, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}

      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          ls -la android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties << KEYEOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          KEYEOF

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-number=${{ github.run_number }}

      - name: Extract version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$(echo $VERSION | cut -d'+' -f1)" >> $GITHUB_OUTPUT
          echo "build=$(echo $VERSION | cut -d'+' -f2)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk             build/app/outputs/flutter-apk/XamePage_v${{ steps.version.outputs.name }}_build${{ steps.version.outputs.build }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: XamePage-v${{ steps.version.outputs.name }}-build${{ steps.version.outputs.build }}
          path: build/app/outputs/flutter-apk/XamePage_*.apk
          retention-days: 30

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build${{ steps.version.outputs.build }}
          name: XamePage v${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.build }})
          files: build/app/outputs/flutter-apk/XamePage_*.apk
          generate_release_notes: false

      - name: Cleanup
        if: always()
        run: rm -f android/app/release.jks android/key.properties
