name: XamePage iOS IPA

on:
  push:
    branches: [xamepage-native-v3.0, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-ios-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Overlay custom iOS files
        run: |
          cp ios/Runner/AppDelegate.swift .flutter_create_ios_backup/Runner/AppDelegate.swift 2>/dev/null || true
          cp -f ios/Runner/AppDelegate.swift ios/Runner/AppDelegate.swift
          cp -f ios/Runner/CallKitService.swift ios/Runner/CallKitService.swift
          cp -f ios/Runner/Info.plist ios/Runner/Info.plist

      - name: Set minimum iOS deployment target to 13.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :IPHONEOS_DEPLOYMENT_TARGET 13.0" ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          echo 'platform :ios, '"'"'13.0'"'"'' > ios/Podfile.tmp
          cat ios/Podfile >> ios/Podfile.tmp
          mv ios/Podfile.tmp ios/Podfile

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: XamePage-iOS
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
