name: XamePage iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-ios-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - name: Backup custom iOS files
        run: |
          mkdir -p /tmp/ios_custom
          cp ios/Runner/AppDelegate.swift /tmp/ios_custom/
          cp ios/Runner/CallKitService.swift /tmp/ios_custom/
          cp ios/Runner/Info.plist /tmp/ios_custom/
          cp ios/Runner/GoogleService-Info.plist /tmp/ios_custom/
          cp ios/Runner/SocketKeepaliveService.swift /tmp/ios_custom/ 2>/dev/null || true
          cp ios/Runner/GoogleService-Info.plist /tmp/ios_custom/
          cp ios/Runner/SocketKeepaliveService.swift /tmp/ios_custom/ 2>/dev/null || true

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Restore custom iOS files
        run: |
          cp /tmp/ios_custom/AppDelegate.swift ios/Runner/AppDelegate.swift
          cp /tmp/ios_custom/CallKitService.swift ios/Runner/CallKitService.swift
          cp /tmp/ios_custom/Info.plist ios/Runner/Info.plist
          cp /tmp/ios_custom/GoogleService-Info.plist ios/Runner/GoogleService-Info.plist
          cp /tmp/ios_custom/SocketKeepaliveService.swift ios/Runner/SocketKeepaliveService.swift 2>/dev/null || true
          cp /tmp/ios_custom/GoogleService-Info.plist ios/Runner/GoogleService-Info.plist
          cp /tmp/ios_custom/SocketKeepaliveService.swift ios/Runner/SocketKeepaliveService.swift 2>/dev/null || true

      - name: Register Swift files in Xcode project
        run: |
          gem install xcodeproj --quiet
          python3 -c "
import subprocess, sys
script = '''
require \"xcodeproj\"
project = Xcodeproj::Project.open(\"ios/Runner.xcodeproj\")
target = project.targets.first
group = project.main_group[\"Runner\"]
[%w[CallKitService.swift SocketKeepaliveService.swift]].flatten.each do |file|
  unless group.files.any? { |f| f.path == file }
    ref = group.new_file(file)
    target.source_build_phase.add_file_reference(ref)
    puts \"Registered #{file}\"
  end
end
project.save
'''
import tempfile, os
with tempfile.NamedTemporaryFile(suffix='.rb', mode='w', delete=False) as f:
    f.write(script)
    name = f.name
os.system(f'ruby {name}')
os.unlink(name)
          " 

      - name: Set minimum iOS deployment target to 13.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          echo "platform :ios, '13.0'" | cat - ios/Podfile > /tmp/Podfile && mv /tmp/Podfile ios/Podfile

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: XamePage-iOS
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
