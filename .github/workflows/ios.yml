name: XamePage iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-ios-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - name: Backup custom iOS files
        run: |
          cp ios/Runner/AppDelegate.swift /tmp/AppDelegate.swift
          cp ios/Runner/CallKitService.swift /tmp/CallKitService.swift
          cp ios/Runner/Info.plist /tmp/Info.plist

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Restore custom iOS files
        run: |
          cp /tmp/AppDelegate.swift ios/Runner/AppDelegate.swift
          cp /tmp/CallKitService.swift ios/Runner/CallKitService.swift
          cp /tmp/Info.plist ios/Runner/Info.plist

      - name: Register CallKitService.swift in Xcode project
        run: |
          python3 << 'PYEOF'
          import re, uuid

          pbxproj = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(pbxproj, 'r') as f:
              content = f.read()

          if 'CallKitService.swift' in content:
              print("Already registered")
              exit(0)

          file_ref_uuid = uuid.uuid4().hex[:24].upper()
          build_file_uuid = uuid.uuid4().hex[:24].upper()

          # Add PBXFileReference
          file_ref = f'		{file_ref_uuid} /* CallKitService.swift */ = {{isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = CallKitService.swift; sourceTree = "<group>"; }};
'
          content = re.sub(r'(AppDelegate\.swift \*/ = \{[^
]+
)', r'' + file_ref, content)

          # Add PBXBuildFile
          build_file = f'		{build_file_uuid} /* CallKitService.swift in Sources */ = {{isa = PBXBuildFile; fileRef = {file_ref_uuid} /* CallKitService.swift */; }};
'
          content = re.sub(r'(AppDelegate\.swift in Sources \*/ = \{[^
]+
)', r'' + build_file, content)

          # Add to PBXGroup (Runner group)
          content = re.sub(r'(AppDelegate\.swift \*/,
)', r'				' + file_ref_uuid + ' /* CallKitService.swift */,
', content)

          # Add to PBXSourcesBuildPhase
          content = re.sub(r'(AppDelegate\.swift in Sources \*/,
)', r'				' + build_file_uuid + ' /* CallKitService.swift in Sources */,
', content)

          with open(pbxproj, 'w') as f:
              f.write(content)
          print("Registered successfully")
          PYEOF

      - name: Set minimum iOS deployment target to 13.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          echo "platform :ios, '13.0'" | cat - ios/Podfile > /tmp/Podfile && mv /tmp/Podfile ios/Podfile

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: XamePage-iOS
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
