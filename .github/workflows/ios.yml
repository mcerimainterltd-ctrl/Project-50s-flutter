name: XamePage iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-ios-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - name: Backup custom iOS files
        run: |
          mkdir -p /tmp/ios_custom
          cp ios/Runner/AppDelegate.swift /tmp/ios_custom/
          cp ios/Runner/CallKitService.swift /tmp/ios_custom/
          cp ios/Runner/Info.plist /tmp/ios_custom/
          cp ios/Runner/GoogleService-Info.plist /tmp/ios_custom/
          cp ios/Runner/GoogleService-Info.plist /tmp/ios_custom/

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Restore custom iOS files
        run: |
          cp /tmp/ios_custom/AppDelegate.swift ios/Runner/AppDelegate.swift
          cp /tmp/ios_custom/CallKitService.swift ios/Runner/CallKitService.swift
          cp /tmp/ios_custom/Info.plist ios/Runner/Info.plist
          cp /tmp/ios_custom/GoogleService-Info.plist ios/Runner/GoogleService-Info.plist
          cp /tmp/ios_custom/GoogleService-Info.plist ios/Runner/GoogleService-Info.plist

      - name: Register CallKitService.swift in Xcode project
        run: |
          cd ios
          gem install xcodeproj --quiet
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('Runner.xcodeproj')
            target = project.targets.first
            group = project.main_group['Runner']
            unless group.files.any? { |f| f.path == 'CallKitService.swift' }
              file_ref = group.new_file('CallKitService.swift')
              target.source_build_phase.add_file_reference(file_ref)
              project.save
              puts 'Registered CallKitService.swift'
            else
              puts 'Already registered'
            end
          "

      - name: Set minimum iOS deployment target to 13.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          echo "platform :ios, '13.0'" | cat - ios/Podfile > /tmp/Podfile && mv /tmp/Podfile ios/Podfile

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: XamePage-iOS
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
