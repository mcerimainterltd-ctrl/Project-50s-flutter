name: xame_discovery
description: A production-grade discovery flagship.
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Core Architecture & State
  flutter_riverpod: ^2.1.3
  go_router: ^5.2.4
  
  # Backend & Services
  firebase_core: ^2.4.0
  firebase_auth: ^4.2.1
  firebase_messaging: ^14.1.4
  cloud_firestore: ^4.3.0
  socket_io_client: ^2.0.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Media & UI
  video_player: ^2.4.7
  visibility_detector: ^0.3.3
  cached_network_image: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^1.1.3
  build_runner: ^2.3.3

flutter:
  uses-material-design: true
