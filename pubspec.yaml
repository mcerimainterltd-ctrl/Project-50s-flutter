name: xamepage
description: XamePage - Ultramodern calling & messaging app
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  socket_io_client: ^2.0.3+1
  flutter_webrtc: 0.9.47
  go_router: ^14.2.7
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  flutter_callkit_incoming: ^2.0.5
  audioplayers: ^6.1.0
  dio: ^5.7.0
  intl: ^0.19.0
  uuid: ^4.4.2
  local_auth: ^2.3.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icons/
    - assets/splash/
