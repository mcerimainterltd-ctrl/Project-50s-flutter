name: xamepage
description: XamePage - Ultramodern calling & messaging app
publish_to: 'none'
version: 2.1.0+164

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  socket_io_client: ^2.0.0
  flutter_webrtc: ^0.12.3
  go_router: ^14.2.7
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  audioplayers: ^6.1.0
  dio: ^5.7.0
  intl: ^0.19.0
  uuid: ^4.4.2
  local_auth: ^2.3.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/xamepage_call.mp3
    - assets/audio/xamepage_message.mp3
    - assets/audio/xamepage_outgoing.mp3
    - assets/audio/
    - assets/icons/
    - assets/splash/
